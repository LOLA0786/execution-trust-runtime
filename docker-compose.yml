services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORLD_STATE_INTEGRITY_ENABLED=true
      - WORLD_STATE_REPLAY_ENABLED=true
    volumes:
      - .:/app
    depends_on:
      - redis
    # Production: run both API + Celery worker (or scale separately)
    command: >
      sh -c "uvicorn app.main_fastapi:app --host 0.0.0.0 --port 8000 & 
             celery -A celery_app worker --loglevel=info"

  # Optional: Postgres for SQLAlchemy models
  # db:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: trust_runtime
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  # postgres_data:
