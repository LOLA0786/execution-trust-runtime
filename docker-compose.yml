services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORLD_STATE_INTEGRITY_ENABLED=true
      - WORLD_STATE_REPLAY_ENABLED=true
    volumes:
      - .:/app
    depends_on:
      - redis

